  <text x="104" y="142" fill="#7DD3FC" font-family="Pretendard, Inter, sans-serif" font-size="28" font-weight="700">Gemma 4 / On-device AI</text>
  <text x="104" y="218" fill="#F3F7FF" font-family="Pretendard, Inter, sans-serif" font-size="58" font-weight="800">온디바이스 AI는 이제</text>
  <text x="104" y="286" fill="#F3F7FF" font-family="Pretendard, Inter, sans-serif" font-size="58" font-weight="800">보조 계층으로 꽤 쓸 만하다</text>

  <rect x="104" y="338" width="612" height="384" rx="24" fill="#0D1527" stroke="#24314E" stroke-width="2"/>
