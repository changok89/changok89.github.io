  <text x="144" y="456" fill="#E5EDFF" font-family="Pretendard, Inter, sans-serif" font-size="32" font-weight="700">• mobile / IoT execution</text>
  <text x="144" y="510" fill="#E5EDFF" font-family="Pretendard, Inter, sans-serif" font-size="32" font-weight="700">• agentic workflows</text>
  <text x="144" y="564" fill="#E5EDFF" font-family="Pretendard, Inter, sans-serif" font-size="32" font-weight="700">• multimodal support</text>
  <text x="144" y="618" fill="#E5EDFF" font-family="Pretendard, Inter, sans-serif" font-size="32" font-weight="700">• privacy-first preprocessing</text>
  <text x="144" y="690" fill="#7DD3FC" font-family="Pretendard, Inter, sans-serif" font-size="26" font-weight="700">main model replacement? not yet.</text>

  <rect x="782" y="338" width="650" height="384" rx="24" fill="#0D1527" stroke="#24314E" stroke-width="2"/>
  <rect x="844" y="404" width="212" height="72" rx="18" fill="#2563EB"/>
  <text x="898" y="449" fill="white" font-family="Inter, sans-serif" font-size="28" font-weight="800">LOCAL</text>
  <rect x="1164" y="404" width="206" height="72" rx="18" fill="#D97706"/>
  <text x="1209" y="449" fill="white" font-family="Inter, sans-serif" font-size="28" font-weight="800">CLOUD</text>
  <line x1="1056" y1="440" x2="1164" y2="440" stroke="#93C5FD" stroke-width="6"/>
  <text x="846" y="550" fill="#C7D2FE" font-family="Pretendard, Inter, sans-serif" font-size="28" font-weight="700">classification</text>
  <text x="846" y="596" fill="#C7D2FE" font-family="Pretendard, Inter, sans-serif" font-size="28" font-weight="700">preprocessing</text>
  <text x="846" y="642" fill="#C7D2FE" font-family="Pretendard, Inter, sans-serif" font-size="28" font-weight="700">short summaries</text>
  <text x="1170" y="550" fill="#FDE68A" font-family="Pretendard, Inter, sans-serif" font-size="28" font-weight="700">long reasoning</text>
