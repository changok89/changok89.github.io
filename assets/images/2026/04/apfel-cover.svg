<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#0B1020"/>
  <rect x="64" y="64" width="1472" height="772" rx="28" fill="#11182D" stroke="#26324F" stroke-width="2"/>
  <text x="104" y="142" fill="#8AB4FF" font-family="Pretendard, Inter, sans-serif" font-size="28" font-weight="700">apfel / Apple Intelligence / On-device AI</text>
  <text x="104" y="212" fill="#F4F7FF" font-family="Pretendard, Inter, sans-serif" font-size="54" font-weight="800">Mac에 이미 들어 있는 AI를</text>
  <text x="104" y="276" fill="#F4F7FF" font-family="Pretendard, Inter, sans-serif" font-size="54" font-weight="800">어떻게 작업 도구로 바꿀까</text>

  <rect x="104" y="334" width="620" height="390" rx="24" fill="#0D1527" stroke="#24314E" stroke-width="2"/>
  <text x="144" y="392" fill="#A5B4FC" font-family="Pretendard, Inter, sans-serif" font-size="26" font-weight="700">Why apfel is interesting</text>
  <text x="144" y="456" fill="#E5EDFF" font-family="Pretendard, Inter, sans-serif" font-size="32" font-weight="700">• CLI</text>
  <text x="144" y="508" fill="#E5EDFF" font-family="Pretendard, Inter, sans-serif" font-size="32" font-weight="700">• OpenAI-compatible server</text>
  <text x="144" y="560" fill="#E5EDFF" font-family="Pretendard, Inter, sans-serif" font-size="32" font-weight="700">• interactive chat</text>
  <text x="144" y="612" fill="#E5EDFF" font-family="Pretendard, Inter, sans-serif" font-size="32" font-weight="700">• local utility tools</text>
  <text x="144" y="682" fill="#8AB4FF" font-family="Pretendard, Inter, sans-serif" font-size="26" font-weight="700">The model matters less than the interface.</text>

  <rect x="786" y="334" width="650" height="390" rx="24" fill="#0D1527" stroke="#24314E" stroke-width="2"/>
  <rect x="850" y="410" width="180" height="68" rx="18" fill="#1D4ED8"/>
  <text x="901" y="453" fill="white" font-family="Inter, sans-serif" font-size="28" font-weight="800">MODEL</text>
  <rect x="1138" y="410" width="210" height="68" rx="18" fill="#D97706"/>
  <text x="1179" y="453" fill="white" font-family="Inter, sans-serif" font-size="28" font-weight="800">INTERFACE</text>
  <line x1="1030" y1="444" x2="1138" y2="444" stroke="#93C5FD" stroke-width="6"/>
  <text x="854" y="548" fill="#C7D2FE" font-family="Pretendard, Inter, sans-serif" font-size="28" font-weight="700">Apple Intelligence</text>
  <text x="854" y="594" fill="#C7D2FE" font-family="Pretendard, Inter, sans-serif" font-size="28" font-weight="700">FoundationModels</text>
  <text x="1142" y="548" fill="#FDE68A" font-family="Pretendard, Inter, sans-serif" font-size="28" font-weight="700">terminal</text>
  <text x="1142" y="594" fill="#FDE68A" font-family="Pretendard, Inter, sans-serif" font-size="28" font-weight="700">server</text>
  <text x="1142" y="640" fill="#FDE68A" font-family="Pretendard, Inter, sans-serif" font-size="28" font-weight="700">tools</text>

  <text x="104" y="792" fill="#94A3B8" font-family="Pretendard, Inter, sans-serif" font-size="24" font-weight="600">apfel makes the built-in model feel usable in real workflows.</text>
